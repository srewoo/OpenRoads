<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hill Ramp</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#eef3f6;color:#26303a;padding:22px;display:flex;justify-content:center}
  .card{width:460px;background:#fff;border:1px solid #dde6ec;border-radius:20px;overflow:hidden;
    box-shadow:0 10px 34px rgba(40,60,80,.10)}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
  .hd h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
    color:#5d7184;background:#eef3f6;border:1px solid #dde6ec;padding:4px 10px;border-radius:999px}
  .art{padding:6px 0 10px;background:linear-gradient(180deg,#f6fafc,#eef4f7)}
  .art svg{display:block;margin:0 auto}
  .meta{padding:14px 20px 4px;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px}
  .meta .k{color:#7d8 d9b;opacity:.7;color:#7d8d9b}
  .meta .v{font-weight:600;text-align:right}
  .palette{display:flex;gap:0;padding:14px 20px 20px}
  .sw{flex:1;height:46px;border-radius:0;position:relative}
  .sw:first-child{border-radius:10px 0 0 10px}.sw:last-child{border-radius:0 10px 10px 0}
  .sw span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;
    font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .note{padding:0 20px 18px;font-size:12px;line-height:1.55;color:#5d7184}
</style></head>
<body>
  <div class="card">
    <div class="hd"><h1>Hill Ramp</h1><span class="tag">off-road · big air</span></div>
    <div class="art">
<svg width="440" height="220" viewBox="0 0 440 220">
  <ellipse cx="220" cy="198" rx="150" ry="10" fill="#000" opacity="0.08"/>
  <path d="M110 190 L330 190 L330 96 Z" fill="#8bbd6a"/>
  <path d="M110 190 L330 190 L330 96 Z" fill="none" stroke="#7aa85c" stroke-width="2"/>
  <!-- dashed run-up -->
  <path d="M40 190 L110 190" stroke="#f2efe2" stroke-width="4" stroke-dasharray="10 8"/>
  <!-- launching car arc -->
  <path d="M330 96 q40 -34 80 -10" stroke="#5d7184" stroke-width="2" stroke-dasharray="5 5" fill="none"/>
  <rect x="392" y="74" width="26" height="12" rx="4" fill="#c0392f"/>
</svg></div>
    <div class="meta"><div class="k">Placement</div><div class="v">Off-road wedge / hill</div><div class="k">Mission</div><div class="v">Hit it at 50+ km/h to clear real height</div><div class="k">Physics</div><div class="v">Launch velocity scales with approach speed</div><div class="k">Footprint</div><div class="v">~10 m ramp, collision radius 5.5 m</div></div>
    <div class="palette"><div class="sw" style="background:#8bbd6a"><span>RAMP</span></div><div class="sw" style="background:#7aa85c"><span>EDGE</span></div><div class="sw" style="background:#f2efe2"><span>RUN-UP</span></div><div class="sw" style="background:#c0392f"><span>AIR!</span></div></div>
  </div>
</body></html>
