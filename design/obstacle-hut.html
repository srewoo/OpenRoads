<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wooden Hut</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#eef3f6;color:#26303a;padding:22px;display:flex;justify-content:center}
  .card{width:460px;background:#fff;border:1px solid #dde6ec;border-radius:20px;overflow:hidden;
    box-shadow:0 10px 34px rgba(40,60,80,.10)}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
  .hd h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
    color:#5d7184;background:#eef3f6;border:1px solid #dde6ec;padding:4px 10px;border-radius:999px}
  .art{padding:6px 0 10px;background:linear-gradient(180deg,#f6fafc,#eef4f7)}
  .art svg{display:block;margin:0 auto}
  .meta{padding:14px 20px 4px;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px}
  .meta .k{color:#7d8 d9b;opacity:.7;color:#7d8d9b}
  .meta .v{font-weight:600;text-align:right}
  .palette{display:flex;gap:0;padding:14px 20px 20px}
  .sw{flex:1;height:46px;border-radius:0;position:relative}
  .sw:first-child{border-radius:10px 0 0 10px}.sw:last-child{border-radius:0 10px 10px 0}
  .sw span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;
    font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .note{padding:0 20px 18px;font-size:12px;line-height:1.55;color:#5d7184}
</style></head>
<body>
  <div class="card">
    <div class="hd"><h1>Wooden Hut</h1><span class="tag">off-road · smashable</span></div>
    <div class="art">
<svg width="440" height="220" viewBox="0 0 440 220">
  <ellipse cx="220" cy="196" rx="120" ry="12" fill="#000" opacity="0.08"/>
  <rect x="150" y="96" width="140" height="100" fill="#b5895c"/>
  <path d="M134 96 L220 40 L306 96 Z" fill="#8a5a3c"/>
  <rect x="196" y="140" width="48" height="56" fill="#5e3d28"/>
  <rect x="166" y="112" width="26" height="24" fill="#7a5230"/>
  <rect x="248" y="112" width="26" height="24" fill="#7a5230"/>
  <!-- plank lines -->
  <line x1="150" y1="124" x2="290" y2="124" stroke="#9c7148" stroke-width="2"/>
  <line x1="150" y1="156" x2="290" y2="156" stroke="#9c7148" stroke-width="2"/>
</svg></div>
    <div class="meta"><div class="k">Placement</div><div class="v">Off-road, 16–28 m off the asphalt</div><div class="k">Mission</div><div class="v">Flatten it (drive in while moving)</div><div class="k">Reaction</div><div class="v">Body tilts, car kicks back, camera shake</div><div class="k">Footprint</div><div class="v">~5 × 5 m, collision radius 3.6 m</div></div>
    <div class="palette"><div class="sw" style="background:#b5895c"><span>WALL</span></div><div class="sw" style="background:#8a5a3c"><span>ROOF</span></div><div class="sw" style="background:#5e3d28"><span>DOOR</span></div><div class="sw" style="background:#7a5230"><span>WINDOW</span></div></div>
  </div>
</body></html>
