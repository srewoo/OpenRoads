<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pond</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#eef3f6;color:#26303a;padding:22px;display:flex;justify-content:center}
  .card{width:460px;background:#fff;border:1px solid #dde6ec;border-radius:20px;overflow:hidden;
    box-shadow:0 10px 34px rgba(40,60,80,.10)}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
  .hd h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
    color:#5d7184;background:#eef3f6;border:1px solid #dde6ec;padding:4px 10px;border-radius:999px}
  .art{padding:6px 0 10px;background:linear-gradient(180deg,#f6fafc,#eef4f7)}
  .art svg{display:block;margin:0 auto}
  .meta{padding:14px 20px 4px;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px}
  .meta .k{color:#7d8 d9b;opacity:.7;color:#7d8d9b}
  .meta .v{font-weight:600;text-align:right}
  .palette{display:flex;gap:0;padding:14px 20px 20px}
  .sw{flex:1;height:46px;border-radius:0;position:relative}
  .sw:first-child{border-radius:10px 0 0 10px}.sw:last-child{border-radius:0 10px 10px 0}
  .sw span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;
    font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .note{padding:0 20px 18px;font-size:12px;line-height:1.55;color:#5d7184}
</style></head>
<body>
  <div class="card">
    <div class="hd"><h1>Pond</h1><span class="tag">off-road · cross it</span></div>
    <div class="art">
<svg width="440" height="220" viewBox="0 0 440 220">
  <ellipse cx="220" cy="150" rx="150" ry="56" fill="#638967"/>
  <ellipse cx="220" cy="146" rx="132" ry="46" fill="#6fb4d8"/>
  <ellipse cx="220" cy="142" rx="110" ry="36" fill="#86c4e2" opacity="0.7"/>
  <path d="M150 138 q20 -8 40 0" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M230 150 q20 -8 40 0" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- splash droplets -->
  <circle cx="300" cy="120" r="3" fill="#bfe2f2"/><circle cx="312" cy="110" r="2.5" fill="#bfe2f2"/>
  <circle cx="288" cy="108" r="2" fill="#bfe2f2"/>
</svg></div>
    <div class="meta"><div class="k">Placement</div><div class="v">Off-road, on the terrain beside the road</div><div class="k">Mission</div><div class="v">Commit to a full crossing (~0.8 s in water)</div><div class="k">Reaction</div><div class="v">Splash particles + heavy water drag</div><div class="k">Footprint</div><div class="v">~13 m wide, collision radius 6 m</div></div>
    <div class="palette"><div class="sw" style="background:#6fb4d8"><span>WATER</span></div><div class="sw" style="background:#86c4e2"><span>SHALLOW</span></div><div class="sw" style="background:#638967"><span>RIM</span></div><div class="sw" style="background:#bfe2f2"><span>SPLASH</span></div></div>
  </div>
</body></html>
