<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Muscle Car</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#eef3f6;color:#26303a;padding:22px;display:flex;justify-content:center}
  .card{width:460px;background:#fff;border:1px solid #dde6ec;border-radius:20px;overflow:hidden;
    box-shadow:0 10px 34px rgba(40,60,80,.10)}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
  .hd h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
    color:#5d7184;background:#eef3f6;border:1px solid #dde6ec;padding:4px 10px;border-radius:999px}
  .art{padding:6px 0 10px;background:linear-gradient(180deg,#f6fafc,#eef4f7)}
  .art svg{display:block;margin:0 auto}
  .meta{padding:14px 20px 4px;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px}
  .meta .k{color:#7d8 d9b;opacity:.7;color:#7d8d9b}
  .meta .v{font-weight:600;text-align:right}
  .palette{display:flex;gap:0;padding:14px 20px 20px}
  .sw{flex:1;height:46px;border-radius:0;position:relative}
  .sw:first-child{border-radius:10px 0 0 10px}.sw:last-child{border-radius:0 10px 10px 0}
  .sw span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;
    font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .note{padding:0 20px 18px;font-size:12px;line-height:1.55;color:#5d7184}
</style></head>
<body>
  <div class="card">
    <div class="hd"><h1>Muscle Car</h1><span class="tag">V8 / American</span></div>
    <div class="art">
<svg width="440" height="240" viewBox="0 0 440 240">
  <ellipse cx="220" cy="206" rx="180" ry="12" fill="#000" opacity="0.08"/>
  <!-- body -->
  <path d="M58 150 C70 120 120 116 150 114 L210 96 C240 88 300 92 330 104 L392 130 C404 134 404 158 392 162 L70 168 C58 166 54 160 58 150 Z" fill="#c0392f"/>
  <!-- fastback cabin -->
  <path d="M168 116 L226 98 C252 92 292 96 300 110 L168 116 Z" fill="#962a23"/>
  <!-- glass -->
  <path d="M182 114 L228 102 C246 99 274 101 284 110 L182 114 Z" fill="#1d2a34" opacity="0.9"/>
  <!-- stripe -->
  <path d="M70 156 L388 146" stroke="#eee9dc" stroke-width="5" opacity="0.95"/>
  <!-- splitter + bumpers -->
  <rect x="356" y="160" width="44" height="9" rx="3" fill="#cdd2d8"/>
  <rect x="48" y="158" width="34" height="9" rx="3" fill="#cdd2d8"/>
  <circle cx="384" cy="142" r="7" fill="#fff6dc"/>
  <circle cx="132" cy="168" r="30" fill="#191c20"/>
    <circle cx="132" cy="168" r="18" fill="#cdd2d8"/>
    <circle cx="132" cy="168" r="4.8" fill="#2a2d31"/>
  <circle cx="320" cy="168" r="34" fill="#191c20"/>
    <circle cx="320" cy="168" r="20.4" fill="#cdd2d8"/>
    <circle cx="320" cy="168" r="5.44" fill="#2a2d31"/>
</svg></div>
    <div class="meta"><div class="k">Class</div><div class="v">Low-slung muscle coupe</div><div class="k">Body</div><div class="v">Rounded chamfer panels, fastback roof</div><div class="k">Stance</div><div class="v">Fat rear tyres, front splitter, ducktail</div><div class="k">Finish</div><div class="v">Glossy paint + chrome + tinted glass</div><div class="k">Top speed</div><div class="v">240 km/h</div></div>
    <div class="palette"><div class="sw" style="background:#c0392f"><span>BODY</span></div><div class="sw" style="background:#962a23"><span>SHADOW</span></div><div class="sw" style="background:#eee9dc"><span>STRIPE</span></div><div class="sw" style="background:#1d2a34"><span>GLASS</span></div><div class="sw" style="background:#cdd2d8"><span>CHROME</span></div></div>
  </div>
</body></html>
