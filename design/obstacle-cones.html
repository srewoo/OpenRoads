<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cone Run</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#eef3f6;color:#26303a;padding:22px;display:flex;justify-content:center}
  .card{width:460px;background:#fff;border:1px solid #dde6ec;border-radius:20px;overflow:hidden;
    box-shadow:0 10px 34px rgba(40,60,80,.10)}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
  .hd h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
    color:#5d7184;background:#eef3f6;border:1px solid #dde6ec;padding:4px 10px;border-radius:999px}
  .art{padding:6px 0 10px;background:linear-gradient(180deg,#f6fafc,#eef4f7)}
  .art svg{display:block;margin:0 auto}
  .meta{padding:14px 20px 4px;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px}
  .meta .k{color:#7d8 d9b;opacity:.7;color:#7d8d9b}
  .meta .v{font-weight:600;text-align:right}
  .palette{display:flex;gap:0;padding:14px 20px 20px}
  .sw{flex:1;height:46px;border-radius:0;position:relative}
  .sw:first-child{border-radius:10px 0 0 10px}.sw:last-child{border-radius:0 10px 10px 0}
  .sw span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;
    font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .note{padding:0 20px 18px;font-size:12px;line-height:1.55;color:#5d7184}
</style></head>
<body>
  <div class="card">
    <div class="hd"><h1>Cone Run</h1><span class="tag">on-road · slalom</span></div>
    <div class="art">
<svg width="440" height="220" viewBox="0 0 440 220">
  <ellipse cx="220" cy="196" rx="150" ry="10" fill="#000" opacity="0.06"/>
  
    <g transform="translate(80, 150)">
      <polygon points="0,0 14,40 -14,40" fill="#e07a3c"/>
      <rect x="-10" y="20" width="20" height="7" fill="#f4f1e4"/>
      <ellipse cx="0" cy="42" rx="16" ry="4" fill="#000" opacity="0.08"/>
    </g>
    <g transform="translate(150, 164)">
      <polygon points="0,0 14,40 -14,40" fill="#e07a3c"/>
      <rect x="-10" y="20" width="20" height="7" fill="#f4f1e4"/>
      <ellipse cx="0" cy="42" rx="16" ry="4" fill="#000" opacity="0.08"/>
    </g>
    <g transform="translate(220, 150)">
      <polygon points="0,0 14,40 -14,40" fill="#e07a3c"/>
      <rect x="-10" y="20" width="20" height="7" fill="#f4f1e4"/>
      <ellipse cx="0" cy="42" rx="16" ry="4" fill="#000" opacity="0.08"/>
    </g>
    <g transform="translate(290, 164)">
      <polygon points="0,0 14,40 -14,40" fill="#e07a3c"/>
      <rect x="-10" y="20" width="20" height="7" fill="#f4f1e4"/>
      <ellipse cx="0" cy="42" rx="16" ry="4" fill="#000" opacity="0.08"/>
    </g>
    <g transform="translate(360, 150)">
      <polygon points="0,0 14,40 -14,40" fill="#e07a3c"/>
      <rect x="-10" y="20" width="20" height="7" fill="#f4f1e4"/>
      <ellipse cx="0" cy="42" rx="16" ry="4" fill="#000" opacity="0.08"/>
    </g>
  <!-- one knocked over -->
  <g transform="translate(360,178) rotate(70)">
    <polygon points="0,0 12,34 -12,34" fill="#e07a3c" opacity="0.85"/>
  </g>
</svg></div>
    <div class="meta"><div class="k">Placement</div><div class="v">On the road — a slalom set</div><div class="k">Mission</div><div class="v">Bowl down the ENTIRE set (e.g. 6/6)</div><div class="k">Reaction</div><div class="v">Each cone topples + thud on contact</div><div class="k">Difficulty</div><div class="v">Miss one and it stays incomplete</div></div>
    <div class="palette"><div class="sw" style="background:#e07a3c"><span>CONE</span></div><div class="sw" style="background:#f4f1e4"><span>STRIPE</span></div></div>
  </div>
</body></html>
