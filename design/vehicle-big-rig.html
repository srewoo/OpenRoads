<!-- @dsCard group="Vehicles" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Big Rig</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#eef3f6;color:#26303a;padding:22px;display:flex;justify-content:center}
  .card{width:460px;background:#fff;border:1px solid #dde6ec;border-radius:20px;overflow:hidden;
    box-shadow:0 10px 34px rgba(40,60,80,.10)}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
  .hd h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
    color:#5d7184;background:#eef3f6;border:1px solid #dde6ec;padding:4px 10px;border-radius:999px}
  .art{padding:6px 0 10px;background:linear-gradient(180deg,#f6fafc,#eef4f7)}
  .art svg{display:block;margin:0 auto}
  .meta{padding:14px 20px 4px;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px}
  .meta .k{color:#7d8 d9b;opacity:.7;color:#7d8d9b}
  .meta .v{font-weight:600;text-align:right}
  .palette{display:flex;gap:0;padding:14px 20px 20px}
  .sw{flex:1;height:46px;border-radius:0;position:relative}
  .sw:first-child{border-radius:10px 0 0 10px}.sw:last-child{border-radius:0 10px 10px 0}
  .sw span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;
    font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .note{padding:0 20px 18px;font-size:12px;line-height:1.55;color:#5d7184}
</style></head>
<body>
  <div class="card">
    <div class="hd"><h1>Big Rig</h1><span class="tag">Optimus-style hauler</span></div>
    <div class="art">
<svg width="440" height="240" viewBox="0 0 440 240">
  <ellipse cx="220" cy="208" rx="190" ry="12" fill="#000" opacity="0.08"/>
  <!-- chassis -->
  <rect x="70" y="160" width="300" height="20" rx="5" fill="#202327"/>
  <!-- red hood -->
  <path d="M300 120 L368 120 C378 120 382 126 382 140 L382 160 L300 160 Z" fill="#c23030"/>
  <!-- blue cab -->
  <path d="M150 70 L300 70 L300 160 L150 160 Z" fill="#2f63b8"/>
  <!-- sleeper -->
  <rect x="92" y="92" width="62" height="68" rx="8" fill="#244f95"/>
  <!-- cowl band -->
  <rect x="300" y="112" width="82" height="14" fill="#2f63b8"/>
  <!-- windshield -->
  <path d="M158 78 L292 78 L292 116 L158 116 Z" fill="#1d2a34" opacity="0.9"/>
  <!-- grille + bull bar -->
  <rect x="376" y="128" width="9" height="30" fill="#cdd2d8"/>
  <circle cx="380" cy="150" r="6" fill="#fff6dc"/>
  <!-- twin stacks -->
  <rect x="150" y="40" width="9" height="54" fill="#cdd2d8"/>
  <rect x="292" y="40" width="9" height="40" fill="#cdd2d8"/>
  <circle cx="120" cy="176" r="26" fill="#191c20"/>
    <circle cx="120" cy="176" r="15.6" fill="#cdd2d8"/>
    <circle cx="120" cy="176" r="4.16" fill="#2a2d31"/>
  <circle cx="248" cy="176" r="26" fill="#191c20"/>
    <circle cx="248" cy="176" r="15.6" fill="#cdd2d8"/>
    <circle cx="248" cy="176" r="4.16" fill="#2a2d31"/>
  <circle cx="300" cy="176" r="26" fill="#191c20"/>
    <circle cx="300" cy="176" r="15.6" fill="#cdd2d8"/>
    <circle cx="300" cy="176" r="4.16" fill="#2a2d31"/>
</svg></div>
    <div class="meta"><div class="k">Class</div><div class="v">Heavy semi tractor unit</div><div class="k">Cab</div><div class="v">Tall blue cab + sleeper, red hood + cowl</div><div class="k">Detail</div><div class="v">Chrome grille, bull bar, twin capped stacks</div><div class="k">Axles</div><div class="v">6 big wheels, highest grip</div><div class="k">Top speed</div><div class="v">175 km/h</div></div>
    <div class="palette"><div class="sw" style="background:#2f63b8"><span>BLUE</span></div><div class="sw" style="background:#244f95"><span>BLUE-D</span></div><div class="sw" style="background:#c23030"><span>RED</span></div><div class="sw" style="background:#cdd2d8"><span>CHROME</span></div><div class="sw" style="background:#1d2a34"><span>GLASS</span></div></div>
  </div>
</body></html>
